<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>刺猬选短信 · 交互原型</title>
  <!-- PROTOTYPE — throwaway UI. Three variants, switchable via ?variant=, for the permission/scan/browse flow. -->
  <style>
    :root{--ink:#17201c;--muted:#68736d;--line:#dce4df;--brand:#176b4a;--soft:#edf7f1;--warn:#fff4d6;--bg:#f5f6f3}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 system-ui,-apple-system,sans-serif}button,input,select{font:inherit}button{cursor:pointer}.phone{width:min(430px,100%);min-height:100vh;margin:auto;background:#fff;padding-bottom:90px;box-shadow:0 0 30px #0001}.top{padding:20px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}h1,h2,h3,p{margin:0}h1{font-size:21px}h2{font-size:18px}h3{font-size:15px}.muted{color:var(--muted)}.pad{padding:16px}.card{border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:12px;background:#fff}.primary{border:0;border-radius:12px;background:var(--brand);color:#fff;padding:11px 16px;font-weight:700}.ghost{border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px 14px}.danger{color:#a13b2e}.row{display:flex;align-items:center;gap:10px}.between{justify-content:space-between}.stack{display:grid;gap:10px}.tag{display:inline-block;background:var(--soft);color:var(--brand);padding:3px 8px;border-radius:99px;font-size:12px}.warn{background:var(--warn);padding:10px;border-radius:10px}.progress{height:8px;background:#e8ece9;border-radius:9px;overflow:hidden}.progress i{display:block;width:38%;height:100%;background:var(--brand)}.tabs{display:flex;gap:8px;overflow:auto;padding:12px 16px;border-bottom:1px solid var(--line)}.tabs button{white-space:nowrap;border:0;border-radius:99px;padding:8px 12px;background:#eef1ef}.tabs button.on{background:var(--ink);color:white}.sms{padding:14px 16px;border-bottom:1px solid var(--line)}.sms p{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:4px}.fab{position:fixed;right:max(18px,calc((100vw - 430px)/2 + 18px));bottom:88px;border:0;border-radius:99px;background:var(--brand);color:white;padding:13px 17px;box-shadow:0 6px 20px #0003}.switch{position:fixed;z-index:20;left:50%;bottom:18px;transform:translateX(-50%);display:flex;align-items:center;gap:12px;background:#111;color:#fff;border-radius:99px;padding:8px 10px;box-shadow:0 5px 22px #0005}.switch button{width:35px;height:35px;border:0;border-radius:50%;background:#333;color:#fff;font-size:18px}.switch span{min-width:170px;text-align:center;font-weight:700}.hide{display:none!important}.steps{display:flex;gap:5px;margin:18px 0}.steps i{height:5px;flex:1;border-radius:8px;background:#ddd}.steps i.on{background:var(--brand)}.hero{padding:28px 18px 18px;background:linear-gradient(150deg,#e3f4e9,#fff)}.hero .hedgehog{font-size:58px;margin-bottom:8px}.permission{display:grid;grid-template-columns:38px 1fr;gap:12px}.permission b{display:block}.icon{width:38px;height:38px;border-radius:12px;background:var(--soft);display:grid;place-items:center}.bottom-actions{position:sticky;bottom:72px;padding:12px 16px;background:#fffd;border-top:1px solid var(--line)}.nav{display:grid;grid-template-columns:repeat(4,1fr);position:sticky;bottom:70px;background:#fff;border-top:1px solid var(--line);padding:8px 4px}.nav button{border:0;background:none;color:var(--muted);font-size:12px}.nav button.on{color:var(--brand);font-weight:700}.rail{display:flex;min-height:calc(100vh - 70px)}.rail aside{width:112px;background:#16231d;color:#dce9e1;padding:18px 10px}.rail aside button{width:100%;text-align:left;border:0;background:none;color:inherit;padding:12px 8px;border-radius:8px}.rail aside button.on{background:#ffffff20}.rail main{flex:1;min-width:0}.timeline{border-left:2px solid var(--line);margin-left:10px;padding-left:20px}.timeline .card{position:relative}.timeline .card:before{content:'';position:absolute;width:10px;height:10px;border-radius:50%;background:var(--brand);left:-26px;top:20px}.sheet{position:fixed;z-index:10;inset:0;background:#0006;display:grid;align-items:end}.sheet>div{width:min(430px,100%);margin:auto;background:white;border-radius:22px 22px 0 0;padding:20px;max-height:88vh;overflow:auto}.sample{background:#f4f5f2;border-radius:10px;padding:10px;margin:8px 0}.redacted{background:#222;color:#222;border-radius:3px}.choice{display:grid;grid-template-columns:1fr 1fr;gap:10px}.choice button{padding:15px;border:1px solid var(--line);border-radius:12px;background:white;text-align:left}.metric{font-size:25px;font-weight:800}.center{text-align:center}.circle{width:150px;height:150px;border-radius:50%;margin:20px auto;display:grid;place-items:center;background:conic-gradient(var(--brand) 38%,#e8ece9 0)}.circle:after{content:'38%';width:116px;height:116px;border-radius:50%;display:grid;place-items:center;background:white;font-size:27px;font-weight:800}
  </style>
</head>
<body><div id="app"></div><div class="switch"><button id="prev" aria-label="上一方案">←</button><span id="variantLabel"></span><button id="next" aria-label="下一方案">→</button></div>
<script>
const variants={A:'引导式首页',B:'信箱优先',C:'任务时间线'};let v=new URLSearchParams(location.search).get('variant')||'A';let screen='home';
const sms=[['米家','【小米】验证码 483921，请勿泄露','卡槽 1','小米'],['1069 *** 88','您的动态码为 7290，有效期5分钟','卡槽 2','待标注'],['招商银行','您尾号1234账户支出…','卡槽 1','招商银行']];
function go(s){screen=s;render()} function btn(label,s,cls='ghost'){return `<button class="${cls}" onclick="go('${s}')">${label}</button>`}
function scan(){return `<div class="card"><div class="row between"><div><b>正在温和扫描</b><div class="muted">已处理 1,842 / 4,910 条 · 手机空闲时继续</div></div><span class="tag">38%</span></div><div class="progress" style="margin:12px 0"><i></i></div><div class="row">${btn('暂停','paused')} ${btn('查看扫描说明','scanHelp')}</div></div>`}
function list(){return sms.map((x,i)=>`<div class="sms" onclick="go('detail${i}')"><div class="row between"><b>${x[0]}</b><span class="muted">10:${32+i}</span></div><p>${x[1]}</p><div class="row"><span class="tag">${x[2]}</span><span class="tag">${x[3]}</span></div></div>`).join('')}
function overlay(content){return `<div class="sheet" onclick="if(event.target===this)go('home')"><div>${content}<div style="margin-top:16px">${btn('关闭','home')}</div></div></div>`}
function commonOverlay(){if(screen==='detail0'||screen==='detail1'||screen==='detail2'){let x=sms[+screen.slice(-1)];return overlay(`<span class="tag">从系统信箱实时读取</span><h2 style="margin:12px 0">${x[0]}</h2><p>${x[1]}</p><hr style="border:0;border-top:1px solid var(--line);margin:18px 0"><div class="stack"><div class="row between"><span>SIM 集合</span><b>${x[2]} · 当前位于${x[2]}</b></div><div class="row between"><span>平台</span><b>${x[3]}</b></div></div>${x[3]==='待标注'?`<div class="warn" style="margin-top:18px">发送者是可能被共享的虚拟号，不能直接当作平台。 ${btn('查看回退解释','senderExplain')}</div><h3 style="margin-top:20px">这是什么平台？</h3><div class="choice"><button onclick="go('trained')"><b>支付宝</b><br><span class="muted">人工确认并学习</span></button><button onclick="go('trained')"><b>淘宝</b><br><span class="muted">人工确认并学习</span></button></div>`:''}`)}
if(screen==='paused')return overlay(`<h2>扫描已暂停</h2><p class="muted">已完成的 1,842 条不会丢失。恢复后从上一批继续。</p><div style="margin-top:16px">${btn('继续扫描','home','primary')}</div>`);
if(screen==='scanHelp')return overlay(`<h2>扫描不会复制短信正文</h2><p>正文始终留在系统短信库。App 每批读取少量短信，只保存短信 ID、SIM 集合和分类结果。系统繁忙时自动放慢。</p>`);
if(screen==='trained')return overlay(`<div class="center"><div style="font-size:48px">✓</div><h2>已标注，模型已学习</h2><p class="muted">仅影响当前短信和之后的新短信，不回改历史结果。</p></div>`);
if(screen==='senderExplain')return overlay(`<h2>为什么没有根据号码直接认平台？</h2><p class="warn">106 短码、虚拟号和字母发送者可能被多个平台共享或重复使用，号码归属不等于验证码平台。</p><p style="margin-top:12px">本机过去有 3 条相同发送者短信被确认属于“支付宝”，这只是候选解释，仍需你标注后才能训练。</p><div style="margin-top:16px">${btn('现在标注','detail1','primary')}</div>`);
if(screen==='platform')return overlay(`<span class="tag">卡槽 1 的平台</span><h2 style="margin:10px 0">小米 · 18 条验证码</h2><p class="muted">最近接收：今天 10:32</p><div class="warn" style="margin-top:15px"><b>下一步：自行前往小米账号注销</b><br>刺猬选短信只帮助找出使用痕迹，不会替你登录或注销。</div><h3 style="margin-top:18px">接收记录</h3><div class="sample">米家登录验证码 · 今天</div><div class="sample">小米账号校验码 · 6月20日</div>`);
if(screen==='labels')return overlay(`<h2>平台标签</h2><p class="muted">重复标签可以合并，历史短信立即按主标签聚合。</p><div class="card"><div class="row between"><div><b>小米</b><br><span class="muted">主标签 · 18 条</span></div>${btn('管理别名','labels')}</div><div class="tag">别名：米家</div> <div class="tag">MI</div></div><div class="card"><div class="row between"><div><b>支付宝 / 支付宝App</b><br><span class="muted">检测到可能重复</span></div>${btn('合并','merged','primary')}</div></div>`);
if(screen==='merged')return overlay(`<div class="center"><div style="font-size:48px">✓</div><h2>已合并为“支付宝”</h2><p class="muted">“支付宝App”保留为别名，今后的训练统一使用主标签；模型不遗忘旧样本。</p></div>`);
if(screen==='harness')return overlay(`<h2>云端助手只能做 3 件事</h2><div class="stack" style="margin-top:14px"><div class="permission"><div class="icon">1</div><div><b>查看你批准的脱敏样本</b><span class="muted">看不到原短信库、联系人或手机号</span></div></div><div class="permission"><div class="icon">2</div><div><b>提交平台建议</b><span class="muted">可建议已有标签、未知或一个新标签</span></div></div><div class="permission"><div class="icon">3</div><div><b>请求训练本地模型</b><span class="muted">只能按你的确认档位执行，无文件、Shell 或任意网络权限</span></div></div></div>`);
if(screen==='llm')return overlay(`<h2>发送 12 条样本给云端辅助标注？</h2><p class="warn">提供商：自定义 OpenAI 兼容 API<br>只有确认后才会发送。助手可建议新平台标签，但能力被限制。</p><div style="margin:10px 0">${btn('查看助手能做什么','harness')}</div><h3>确认档位</h3><label class="sample row"><input type="radio" name="mode" checked> 人工确认：每个建议都由我确认</label><label class="sample row"><input type="radio" name="mode"> 自动确认：达到所选置信档位后可训练，也可创建新标签</label><h3 style="margin-top:15px">脱敏预览</h3><div class="sample">【小米】验证码 <span class="redacted">483921</span>，用于登录账号 <span class="redacted">13800001111</span></div><div class="sample">您的动态码 <span class="redacted">7290</span>，有效期5分钟</div><label class="row"><input type="checkbox" checked> 自动遮盖验证码、手机号</label><div class="row" style="margin-top:16px">${btn('确认发送','llmDone','primary')} ${btn('取消','home')}</div>`);
if(screen==='llmDone')return overlay(`<h2>已收到 12 个候选标签</h2><div class="card"><span class="tag">新标签建议</span><h3>闲鱼</h3><p class="muted">2 条样本 · 等待你确认</p>${btn('确认标签并训练','trained','primary')}</div><p>其余建议会按当前“人工确认”档位逐条等待确认。</p>${btn('开始确认','detail1')}`);return ''}
function onboarding(){return `<div class="hero"><div class="hedgehog">🦔</div><h1>短信不搬家，只帮你归类</h1><p class="muted">正文保留在系统信箱，本地索引只记卡与平台。</p></div><div class="pad"><div class="steps"><i class="on"></i><i></i><i></i></div><div class="stack"><div class="permission"><div class="icon">✉</div><div><b>读取短信</b><span class="muted">用于展示真实信箱并识别验证码平台</span></div></div><div class="permission"><div class="icon">SIM</div><div><b>识别 SIM</b><span class="muted">用于区分 SIM 集合与当前物理卡槽</span></div></div></div><div class="warn" style="margin-top:18px">授权撤销后立即停止读取；已有索引与模型保留。</div></div><div class="bottom-actions">${btn('开始系统授权','home','primary')}</div>`}
function A(){if(screen==='onboard')return onboarding();return `<div class="top"><div><h1>刺猬选短信</h1><span class="muted">找出每张卡用过的平台，便于自行注销</span></div>${btn('权限说明','onboard')}</div><div class="pad">${scan()}<h2 style="margin:18px 0 10px">按 SIM 集合查看平台</h2><div class="choice"><button><b>卡槽 1</b><br><span class="muted">当前在卡槽 1 · 12 个验证码平台</span></button><button><b>卡槽 2</b><br><span class="muted">当前在卡槽 2 · 8 个验证码平台</span></button></div><div class="card" style="margin-top:12px" onclick="go('platform')"><div class="row between"><div><b>小米</b><br><span class="muted">卡槽 1 · 18 条验证码</span></div><span>查看注销线索 ›</span></div></div><div class="row between"><h2 style="margin:12px 0 8px">最近短信</h2>${btn('管理标签与别名','labels')}</div></div>${list()}<button class="fab" onclick="go('llm')">云端辅助标注</button><div class="nav"><button class="on">短信</button><button onclick="go('platform')">平台</button><button onclick="go('detail1')">待标注 7</button><button onclick="go('labels')">标签</button></div>${commonOverlay()}`}
function B(){return `<div class="top"><div><h1>真实信箱</h1><span class="muted">用接收记录定位待注销平台</span></div><span class="tag">只读</span></div><div class="tabs"><button class="on">全部</button><button>卡槽 1</button><button>卡槽 2</button><button>未知卡槽</button></div>${list()}<div class="pad"><div class="warn"><b>后台整理中 · 38%</b><br>不影响现在看短信。<button class="ghost" onclick="go('paused')">暂停</button></div></div><div class="rail"><aside><button class="on">✉ 信箱</button><button>▦ SIM 集合</button><button onclick="go('platform')">◉ 平台</button><button onclick="go('detail1')">? 待标注</button><button onclick="go('llm')">✦ 云端</button><button onclick="go('labels')">⌁ 别名</button></aside><main><div class="pad"><h2>卡槽 1 曾接收</h2><div class="card" onclick="go('platform')"><b>小米</b><p class="muted">18 条验证码 · 查看注销线索 ›</p></div><div class="card"><b>支付宝</b><p class="muted">31 条验证码 · 卡槽 1、卡槽 2</p></div></div></main></div>${commonOverlay()}`}
function C(){return `<div class="hero"><h1>找出用旧手机号注册的平台</h1><p class="muted">按 SIM 集合整理验证码痕迹，再由你自行注销</p></div><div class="pad"><div class="circle"></div><div class="center"><h2>已发现 20 个平台</h2><p class="muted">来自 2 个 SIM 集合，剩余短信分批处理</p><div style="margin:14px">${btn('暂停','paused')} ${btn('为什么要授权','onboard')}</div></div><div class="timeline"><div class="card"><span class="tag">进行中</span><h3>扫描真实信箱</h3><p class="muted">每批 50 条，屏幕外低速执行</p></div><div class="card" onclick="go('platform')"><span class="tag">注销线索</span><h3>卡槽 1 曾在 12 个平台收码</h3><p class="muted">查看平台与对应短信证据</p></div><div class="card" onclick="go('detail1')"><span class="tag">需要你</span><h3>7 个虚拟号结果等待标注</h3><p class="muted">发送者只是弱证据，你的确认让本地模型学习</p></div><div class="card" onclick="go('llm')"><span class="tag">可选</span><h3>请求受限云端助手批注</h3><p class="muted">先批准脱敏批次，再按人工/自动档位确认</p></div><div class="card" onclick="go('labels')"><h3>整理重复平台标签</h3><p class="muted">合并主标签并保留旧名作为别名</p></div></div></div>${commonOverlay()}`}
function render(){document.getElementById('variantLabel').textContent=`${v} — ${variants[v]}`;document.getElementById('app').innerHTML=`<div class="phone">${v==='A'?A():v==='B'?B():C()}</div>`}function cycle(d){let a=Object.keys(variants),i=(a.indexOf(v)+d+a.length)%a.length;v=a[i];screen='home';history.replaceState(null,'',`?variant=${v}`);render()}prev.onclick=()=>cycle(-1);next.onclick=()=>cycle(1);addEventListener('keydown',e=>{if(['INPUT','TEXTAREA'].includes(e.target.tagName)||e.target.isContentEditable)return;if(e.key==='ArrowLeft')cycle(-1);if(e.key==='ArrowRight')cycle(1)});render();
</script></body></html>
